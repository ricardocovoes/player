<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignFlow Player</title>
    <link rel="stylesheet" href="/player/assets/player.css" />
  </head>
  <body>
    <div id="app" style="color:#888;font-family:sans-serif;font-size:28px;padding:40px">A carregar SignFlow…</div>
    <div id="diag" style="position:fixed;left:0;right:0;bottom:0;color:#ff6b6b;background:#1a0000;font-family:monospace;font-size:20px;padding:16px;white-space:pre-wrap;z-index:99999"></div>
    <script>
      // Diagnóstico para browsers webOS antigos: mostra erros no próprio ecrã.
      (function () {
        var d = document.getElementById("diag");
        function show(msg) { if (d) { d.textContent = "ERRO: " + msg; } }
        window.onerror = function (m, src, line, col) {
          show(m + "  @" + (src || "") + ":" + line + ":" + col);
          return false;
        };
        window.addEventListener("unhandledrejection", function (e) {
          show("promise: " + (e.reason && (e.reason.message || e.reason)));
        });
      })();
    </script>
    <script src="/player/assets/player.js"></script>
  </body>
</html>
